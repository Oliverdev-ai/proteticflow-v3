packages:
  - 'apps/*'
  - 'packages/*'

overrides:
  # GHSA-rpmf-866q-6p89 · @lhci/cli transitivo via proxy-agent; pin patched basic-ftp line · revisar em 2026-10
  basic-ftp: ^5.3.1
  # GHSA-37ch-88jc-xwx2 · @lhci/cli usa Express 4; pin patched path-to-regexp 0.1.x · revisar em 2026-10
  express@4>path-to-regexp: 0.1.13
  # GHSA-5wm8-gmm8-39j9 · AWS S3/fast-xml-parser chain; force patched fast-xml-builder · revisar em 2026-10
  fast-xml-builder: ^1.2.0
  # GHSA-22p9-wv53-3rq4 · Tiptap/markdown-it transitive linkifier ReDoS · revisar em 2026-10
  linkify-it: ^5.0.2
  # GHSA-ph9p-34f9-6g65 · @lhci/cli uses tmp <0.2.6; force patched tmp line · revisar em 2026-10
  tmp: ^0.2.7
  # GHSA-fx2h-pf6j-xcff · Vitest/Storybook/Vite dev server on Windows; pin patched Vite 7 · revisar em 2026-10
  vite: ^7.3.6
  # GHSA-96hv-2xvq-fx4p · Lighthouse still pulls ws 7; pin patched ws 7 line · revisar em 2026-10
  "ws@7": 7.5.11
  # GHSA-96hv-2xvq-fx4p · Storybook/Lighthouse pull ws 8; pin patched ws 8 line · revisar em 2026-10
  "ws@8": 8.21.0

allowBuilds:
  # bcrypt builds native auth bindings required by server runtime and tests.
  bcrypt: true
  # core-js ships runtime files prebuilt; its postinstall is not required by jspdf/canvg usage.
  core-js: false
  # esbuild powers Vite, tsx, Storybook and Drizzle tooling across the monorepo.
  esbuild: true
  # msgpackr-extract is optional native acceleration for BullMQ/msgpackr; JS fallback is validated by tests.
  msgpackr-extract: false

strictDepBuilds: true

auditConfig:
  # SEC-02 triaged high advisories through upgrades/overrides; keep GHSA exceptions explicit.
  ignoreGhsas: []
