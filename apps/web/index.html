<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ProteticFlow - Sistema SaaS de gestao para laboratorios de protese dentaria com Kanban, Portal do Cliente, IA e relatorios PDF."
    />
    <meta property="og:title" content="ProteticFlow - Gestao inteligente para laboratorios de protese" />
    <meta
      property="og:description"
      content="Primeiro sistema brasileiro de gestao para laboratorios de protese com IA embarcada."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:locale" content="pt_BR" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="robots" content="index,follow" />
    <!-- Script anti-flash: aplica data-theme antes do CSS carregar -->
    <script>(function(){var k='proteticflow-theme';var s=localStorage.getItem(k);var d=(!s||s==='system')?(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'):s;document.documentElement.setAttribute('data-theme',d);if(d==='dark')document.documentElement.classList.add('dark');})()</script>
    <!-- Fontes self-hosted — preload das variantes críticas da UI inicial -->
    <link rel="preload" as="font" type="font/woff2"
      href="/fonts/inter-400-normal.woff2" crossorigin="anonymous" />
    <link rel="preload" as="font" type="font/woff2"
      href="/fonts/inter-600-normal.woff2" crossorigin="anonymous" />
    <link rel="icon" href="/favicon.ico" />
    <title>ProteticFlow</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
