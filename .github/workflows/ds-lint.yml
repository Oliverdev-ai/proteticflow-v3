name: DS Guardrails (Warn)

on:
  pull_request:
    paths:
      - 'apps/web/src/**'
      - 'apps/web/docs/**'
      - 'apps/web/eslint-plugin-ds.mjs'
      - 'scripts/ds-grep-check.mjs'
      - 'eslint.config.mjs'

jobs:
  ds-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep
      - name: ESLint DS rules (warn mode)
        run: pnpm --filter web lint
      - name: DS grep checks (warn mode)
        run: pnpm ds:check
        continue-on-error: true
