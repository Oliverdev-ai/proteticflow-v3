name: Deploy

on:
  push:
    branches: [dev]
    tags: ['v*']

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy-staging:
    name: Deploy to Staging
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Normalize image name
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.server
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}/server:staging
          provenance: false
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}/server:cache-staging
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}/server:cache-staging,mode=max

  deploy-production:
    name: Deploy to Production
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write   # necessario para criar GitHub Release
      packages: write   # necessario para push no GHCR
    steps:
      - uses: actions/checkout@v4
      - name: Normalize image name
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.server
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}/server:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}/server:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}/server:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}/server:cache,mode=max

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.web
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}/web:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}/web:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}/web:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}/web:cache,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
